<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#08121C" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="NIMOPRA" />
  <meta name="description" content="NIMOPRA SIGNAL — aus einer Idee wird der nächste klare Beweis." />
  <style>
:root {
  --bg: #071019;
  --bg-2: #0b1722;
  --panel: rgba(18, 31, 43, .78);
  --panel-strong: #132230;
  --panel-soft: rgba(32, 51, 66, .58);
  --line: rgba(214, 242, 239, .12);
  --line-strong: rgba(214, 242, 239, .18);
  --ink: #f4f7f4;
  --ink-soft: #9aaeb5;
  --mint: #84f1c2;
  --mint-soft: #bafbdc;
  --cyan: #6ed9ff;
  --lavender: #b9a5ff;
  --orange: #ffbf78;
  --red: #ff8f93;
  --shadow: 0 28px 80px rgba(0, 0, 0, .42);
  --shadow-soft: 0 15px 45px rgba(0, 0, 0, .22);
  --radius-xl: 30px;
  --radius-lg: 22px;
  --radius-md: 17px;
  --radius-sm: 13px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}

* { box-sizing: border-box; }
html { background: var(--bg); }
body {
  margin: 0;
  min-width: 320px;
  min-height: 100vh;
  color: var(--ink);
  background: radial-gradient(900px 620px at 7% -12%, #16334a 0%, transparent 57%), radial-gradient(760px 580px at 106% 36%, rgba(38, 126, 111, .17) 0%, transparent 58%), var(--bg);
  font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
}
body::before {
  content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none; opacity: .26;
  background-image: radial-gradient(rgba(255,255,255,.17) .5px, transparent .6px);
  background-size: 5px 5px;
  mask-image: linear-gradient(to bottom, black, transparent 68%);
}
button, input, textarea, select { font: inherit; }
button { -webkit-tap-highlight-color: transparent; }
button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible { outline: 3px solid rgba(132,241,194,.45); outline-offset: 3px; }

.ambient { position: fixed; width: 340px; height: 340px; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: -2; opacity: .25; }
.ambient-a { left: -180px; top: 140px; background: #3397d0; }
.ambient-b { right: -185px; bottom: 60px; background: #4ae49d; }

.app-shell { min-height: 100vh; padding-bottom: calc(101px + var(--safe-bottom)); }
.topbar {
  height: calc(78px + var(--safe-top));
  padding: calc(12px + var(--safe-top)) 20px 12px;
  display: flex; justify-content: space-between; align-items: center;
  position: sticky; top: 0; z-index: 15;
  background: linear-gradient(180deg, rgba(7,16,25,.96) 0%, rgba(7,16,25,.76) 72%, transparent 100%);
  backdrop-filter: blur(18px);
}
.brand-lockup { display: flex; align-items: center; gap: 11px; }
.brand-mark {
  width: 38px; height: 38px; border-radius: 14px; position: relative; display: grid; place-items: center;
  background: conic-gradient(from 208deg, var(--mint), #72d6ff 30%, #9d9aff 57%, var(--mint) 87%, var(--mint));
  box-shadow: 0 10px 27px rgba(89, 222, 184, .24);
}
.brand-mark::before { content: ""; position: absolute; inset: 2px; border-radius: 12px; background: #0d1924; }
.brand-mark::after { content: ""; position: absolute; width: 18px; height: 18px; border-radius: 50%; border: 1px solid rgba(144, 244, 204, .52); box-shadow: 0 0 0 5px rgba(129, 245, 196, .06); }
.brand-mark-core { position: relative; z-index: 1; color: #effff8; font-weight: 900; font-size: 17px; letter-spacing: -.1em; transform: translateX(-.5px); }
.brand-name { color: #f8fbfa; font-weight: 830; letter-spacing: .16em; font-size: 12px; line-height: 1; }
.brand-subtitle { margin-top: 4px; color: var(--mint); font-size: 8px; letter-spacing: .23em; font-weight: 850; }
.icon-button {
  width: 42px; height: 42px; border: 1px solid var(--line); border-radius: 15px; color: #06130e;
  background: linear-gradient(135deg, #b5ffe1, #78e6ba); cursor: pointer; box-shadow: 0 10px 26px rgba(15, 119, 80, .18);
}
.plus-glyph { display: block; font-size: 26px; line-height: 1; font-weight: 380; margin-top: -2px; }
.icon-button:active, .nav-create:active, .primary-button:active, .inline-action:active { transform: translateY(1px) scale(.97); }

.content { max-width: 760px; margin: 0 auto; padding: 22px 18px 38px; }
.page-enter { animation: page-enter .38s cubic-bezier(.2,.8,.2,1); }
@keyframes page-enter { from { opacity: .01; transform: translateY(10px); filter: blur(2px); } to { opacity: 1; transform: translateY(0); filter: blur(0); } }

.eyebrow { color: var(--mint); font-size: 10px; letter-spacing: .16em; font-weight: 850; text-transform: uppercase; margin: 0 0 11px; }
.eyebrow .live-dot, .signal-pill i { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--mint); margin-right: 7px; vertical-align: 1px; box-shadow: 0 0 0 4px rgba(132,241,194,.1), 0 0 11px rgba(132,241,194,.78); }
.hero-title { margin: 0; max-width: 600px; color: #f7faf8; font-size: clamp(40px, 10vw, 66px); line-height: .97; letter-spacing: -.082em; font-weight: 780; }
.hero-title em { color: var(--mint); font-style: normal; }
.hero-copy { max-width: 560px; margin: 15px 0 0; color: var(--ink-soft); font-size: 15px; line-height: 1.62; }
.home-topline { display: flex; justify-content: space-between; gap: 14px; align-items: flex-start; }
.profile-orb { width: 48px; height: 48px; flex: 0 0 auto; border-radius: 18px; display: grid; place-items: center; font-weight: 840; color: #dfffee; background: linear-gradient(145deg, rgba(122,239,189,.27), rgba(89,189,235,.18)); border: 1px solid rgba(171,255,223,.24); box-shadow: inset 0 1px 0 rgba(255,255,255,.09), 0 16px 30px rgba(0,0,0,.2); }

.hero-card {
  margin-top: 27px; min-height: 334px; overflow: hidden; border-radius: var(--radius-xl); position: relative; padding: 20px;
  background: linear-gradient(135deg, rgba(23,48,58,.96), rgba(13,31,43,.96)); border: 1px solid rgba(166, 242, 213, .16); box-shadow: var(--shadow);
}
.hero-card::before { content: ""; position: absolute; inset: 0; opacity: .65; background: linear-gradient(108deg, transparent 0 42%, rgba(126,247,205,.075) 42.2% 42.5%, transparent 42.8% 100%), linear-gradient(24deg, transparent 0 72%, rgba(122,217,255,.06) 72.2% 72.4%, transparent 72.7%); pointer-events: none; }
.hero-card::after { content: ""; position: absolute; width: 270px; height: 270px; right: -94px; top: -96px; border-radius: 50%; background: radial-gradient(circle, rgba(141,255,204,.58) 0 4%, rgba(101,214,251,.28) 20%, rgba(104,237,181,.08) 46%, transparent 66%); filter: blur(.2px); }
.hero-meta { position: relative; z-index: 2; display: flex; justify-content: space-between; align-items: center; gap: 10px; color: rgba(223,243,244,.66); font-size: 10px; font-weight: 770; letter-spacing: .12em; }
.signal-pill { display: inline-flex; align-items: center; padding: 7px 10px; border: 1px solid rgba(150,248,208,.2); border-radius: 999px; background: rgba(9,26,31,.48); color: #d6ffea; }
.signal-pill i { margin-right: 6px; width: 5px; height: 5px; }
.hero-body { position: relative; z-index: 2; display: flex; align-items: center; gap: 16px; margin-top: 31px; }
.hero-kicker { margin: 0 0 9px; color: var(--mint); font-size: 9px; font-weight: 850; letter-spacing: .18em; }
.hero-card h2 { max-width: 360px; margin: 0; color: #fbfffd; font-size: 30px; line-height: 1.03; letter-spacing: -.06em; }
.hero-card p { max-width: 380px; margin: 12px 0 0; color: rgba(223,243,244,.72); font-size: 13px; line-height: 1.53; }
.signal-orbit { width: 92px; height: 92px; margin-left: auto; flex: 0 0 auto; border-radius: 50%; position: relative; border: 1px solid rgba(151, 253, 209,.45); box-shadow: 0 0 0 12px rgba(125, 246, 195,.04), 0 0 0 25px rgba(125, 246, 195,.025), 0 16px 35px rgba(0,0,0,.2); }
.signal-orbit::before, .signal-orbit::after { content: ""; position: absolute; border-radius: 50%; }
.signal-orbit::before { width: 15px; height: 15px; top: 11px; right: 9px; background: var(--mint); box-shadow: 0 0 25px rgba(132,241,194,.95); }
.signal-orbit::after { inset: 24px; border: 1px solid rgba(110,217,255,.65); box-shadow: inset 0 0 22px rgba(109, 224, 255,.28); }
.hero-footer { position: absolute; z-index: 2; bottom: 18px; left: 20px; right: 20px; display: flex; align-items: end; justify-content: space-between; gap: 12px; }
.hero-metrics { display: flex; gap: 16px; }
.hero-metric { display: grid; gap: 3px; }
.hero-metric strong { color: #f7fffb; font-size: 16px; letter-spacing: -.04em; }
.hero-metric span { color: rgba(224,244,240,.56); font-size: 8px; font-weight: 780; letter-spacing: .11em; }
.inline-action, .small-action, .chip-button { border: 0; cursor: pointer; border-radius: 999px; font-size: 12px; font-weight: 850; transition: transform .16s ease, box-shadow .16s ease; }
.inline-action { color: #092018; padding: 12px 15px; background: linear-gradient(135deg, #b4ffe0, #7ae8be); box-shadow: 0 10px 22px rgba(49,199,139,.2); white-space: nowrap; }
.inline-action span { font-size: 15px; vertical-align: -1px; }
.small-action, .chip-button { color: #dff8ef; padding: 9px 12px; background: rgba(127,231,191,.12); border: 1px solid rgba(144,245,205,.19); }
.small-action:hover, .chip-button:hover { background: rgba(127,231,191,.19); }

.section-head { display: flex; justify-content: space-between; align-items: end; gap: 14px; margin: 34px 0 13px; }
.section-head h2 { margin: 0; color: #f0f5f3; font-size: 19px; letter-spacing: -.045em; }
.section-head p { margin: 0; color: var(--ink-soft); font-size: 11px; }
.stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.stat-card { position: relative; overflow: hidden; min-height: 96px; padding: 15px; border: 1px solid var(--line); border-radius: var(--radius-md); background: linear-gradient(145deg, rgba(28,48,61,.84), rgba(14,27,38,.92)); box-shadow: var(--shadow-soft); }
.stat-card::after { content:""; position:absolute; width:72px; height:72px; right:-36px; bottom:-39px; border-radius:50%; background:radial-gradient(circle, rgba(127,247,202,.23), transparent 64%); }
.stat-card .stat-num { position: relative; z-index: 1; display: block; font-size: 28px; line-height: 1; letter-spacing: -.075em; font-weight: 780; color: #fbfffd; }
.stat-card .stat-label { position: relative; z-index: 1; display: block; margin-top: 9px; color: var(--ink-soft); font-size: 8px; letter-spacing: .11em; font-weight: 800; }

.project-list { display: grid; gap: 11px; }
.project-card { text-align: left; width: 100%; border: 1px solid var(--line); background: linear-gradient(110deg, rgba(28,47,59,.77), rgba(14,29,41,.86)); border-radius: var(--radius-lg); padding: 14px; cursor: pointer; display: grid; grid-template-columns: 45px minmax(0,1fr) auto; gap: 12px; align-items: center; color: var(--ink); box-shadow: var(--shadow-soft); transition: transform .18s ease, border-color .18s ease, background .18s ease; }
.project-card:hover { transform: translateY(-1px); border-color: rgba(144,245,205,.38); background: linear-gradient(110deg, rgba(35,61,70,.86), rgba(16,35,49,.94)); }
.project-icon { width: 45px; height: 45px; border-radius: 16px; position: relative; overflow:hidden; display: grid; place-items: center; color: #e4fff2; font-weight: 850; font-size: 16px; background: linear-gradient(145deg, #1b8069, #234a67); border: 1px solid rgba(208,255,234,.15); }
.project-card:nth-child(2n) .project-icon { background: linear-gradient(145deg, #4c4a91, #244564); }
.project-card:nth-child(3n) .project-icon { background: linear-gradient(145deg, #8a5d3c, #3b506f); }
.project-icon::after { content:""; position:absolute; width:40px; height:40px; border-radius:50%; top:-16px; right:-15px; background:rgba(255,255,255,.17); }
.project-name { display:block; margin: 0; color:#f7fbf9; font-size: 14px; font-weight: 790; letter-spacing: -.02em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.project-meta { display:block; margin:5px 0 0; color: var(--ink-soft); font-size: 10px; }
.project-progress { display:block; margin-top:9px; width:100%; height:3px; overflow:hidden; border-radius:999px; background:rgba(221,255,247,.1); }
.project-progress i { display:block; height:100%; border-radius:inherit; background:linear-gradient(90deg, var(--mint), var(--cyan)); }
.project-score { color: var(--mint); font-size: 9px; letter-spacing:.08em; font-weight: 850; white-space: nowrap; }

.empty-card { border: 1px dashed rgba(166,236,209,.3); background: linear-gradient(140deg, rgba(35,62,72,.5), rgba(14,25,37,.5)); border-radius: var(--radius-lg); padding: 26px; text-align: center; }
.empty-card h3 { margin: 0; color:#f2f9f5; font-size: 19px; letter-spacing: -.045em; }
.empty-card p { margin: 9px auto 17px; max-width: 335px; color: var(--ink-soft); line-height: 1.58; font-size: 13px; }
.tip-card { position: relative; overflow: hidden; background: linear-gradient(125deg, rgba(19,52,54,.68), rgba(20,37,57,.82)); border: 1px solid rgba(139,241,204,.14); border-radius: var(--radius-lg); padding: 18px; margin-top: 12px; box-shadow: var(--shadow-soft); }
.tip-card::after { content:""; position:absolute; right:-36px; bottom:-36px; width:115px; height:115px; border-radius:50%; border:1px solid rgba(133,244,204,.18); box-shadow:0 0 0 17px rgba(133,244,204,.035),0 0 0 34px rgba(133,244,204,.02); }
.tip-card p { position:relative; z-index:1; margin:0; color: var(--ink-soft); font-size: 13px; line-height:1.58; }
.tip-card strong { color: #effff8; }

.primary-button { width:100%; border:1px solid rgba(154,255,214,.13); color:#e9fff5; background:linear-gradient(135deg, #1a6f59, #1b405d); border-radius: 17px; padding:16px 18px; cursor:pointer; font-weight:850; font-size:14px; box-shadow:0 14px 32px rgba(7,25,27,.32); }
.primary-button.mint { color:#092019; background:linear-gradient(135deg, #b4ffe0, #75e6b9); }
.secondary-button { width:100%; border:1px solid var(--line); background:rgba(20,35,47,.75); color:#effaf5; border-radius:17px; padding:15px 18px; cursor:pointer; font-weight:800; font-size:14px; }
.danger-button { width:100%; border:1px solid rgba(255,143,147,.28); background:rgba(118,35,46,.27); color:#ffb0b3; border-radius:17px; padding:14px 18px; cursor:pointer; font-weight:800; font-size:14px; }
.button-row { display:grid; gap:10px; margin-top:21px; }

.form-shell { background:linear-gradient(145deg, rgba(25,44,55,.82), rgba(11,23,34,.92)); border:1px solid var(--line); border-radius:var(--radius-xl); padding:20px; box-shadow:var(--shadow-soft); }
.form-shell label { display:block; color:#cfe5df; font-size:10px; letter-spacing:.1em; font-weight:850; margin:19px 0 8px; text-transform:uppercase; }
.form-shell label:first-child { margin-top:0; }
.text-field, .text-area, .select-field { width:100%; border:1px solid rgba(213,247,239,.12); background:rgba(5,15,23,.45); color:#f2fbf6; border-radius:15px; padding:13px 14px; font-size:15px; box-shadow:inset 0 1px 1px rgba(255,255,255,.02); }
.text-field::placeholder, .text-area::placeholder { color:#6d818a; }
.text-area { min-height:150px; resize:vertical; line-height:1.5; }
.field-note { color:var(--ink-soft); font-size:11px; margin:7px 1px 0; line-height:1.5; }
.field-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.form-actions { display:flex; gap:10px; margin-top:22px; }
.form-actions > * { flex:1; }

.detail-head { display:flex; align-items:flex-start; gap:13px; margin-bottom:18px; }
.back-button { border:1px solid var(--line); background:rgba(21,39,51,.8); color:#e4f8ef; width:38px; height:38px; border-radius:14px; font-size:21px; cursor:pointer; flex:0 0 auto; }
.detail-title { margin:0; color:#f4f8f6; font-size:31px; line-height:1.04; letter-spacing:-.065em; }
.detail-desc { margin:8px 0 0; color:var(--ink-soft); font-size:13px; line-height:1.53; }
.detail-actions { margin-left:auto; display:flex; gap:7px; }
.round-action { width:38px; height:38px; border:1px solid var(--line); background:rgba(21,39,51,.8); color:#dff5ea; border-radius:14px; cursor:pointer; }

.signal-score-card { background:linear-gradient(135deg, rgba(34,80,76,.96), rgba(18,37,57,.96)); color:white; border:1px solid rgba(141,244,204,.18); border-radius:var(--radius-xl); padding:20px; overflow:hidden; position:relative; box-shadow:var(--shadow); }
.signal-score-card::before { content:""; position:absolute; inset:0; background:linear-gradient(90deg, transparent 0 49%, rgba(198,255,242,.06) 49.2% 49.5%, transparent 49.8%); opacity:.5; }
.signal-score-card:after { content:""; position:absolute; width:170px; height:170px; border:1px solid rgba(143,227,188,.55); border-radius:50%; right:-52px; bottom:-66px; box-shadow:0 0 0 18px rgba(143,227,188,.06), 0 0 0 36px rgba(143,227,188,.035); }
.score-label { position:relative; z-index:1; color:rgba(224,255,242,.62); font-size:10px; letter-spacing:.15em; font-weight:850; }
.score-row { position:relative; z-index:1; display:flex; align-items:end; gap:12px; margin-top:11px; }
.score-num { font-size:55px; line-height:.82; letter-spacing:-.09em; font-weight:800; color:var(--mint); }
.score-copy { margin:0 0 2px; color:rgba(235,255,249,.72); font-size:12px; line-height:1.4; max-width:200px; }
.score-bar { position:relative; z-index:1; margin-top:20px; height:7px; border-radius:999px; background:rgba(255,255,255,.16); overflow:hidden; }
.score-bar span { display:block; height:100%; border-radius:inherit; background:linear-gradient(90deg, var(--mint), var(--cyan)); box-shadow:0 0 13px rgba(132,241,194,.55); }

.blueprint-stack { display:grid; gap:12px; margin-top:15px; }
.blueprint-card { position:relative; overflow:hidden; background:linear-gradient(145deg, rgba(28,48,61,.76), rgba(13,27,39,.91)); border:1px solid var(--line); border-radius:var(--radius-lg); padding:17px; box-shadow:var(--shadow-soft); }
.blueprint-card::after { content:""; position:absolute; width:70px; height:70px; border-radius:50%; right:-36px; top:-36px; background:radial-gradient(circle, rgba(124,244,200,.18), transparent 65%); }
.blueprint-card .card-label { position:relative; z-index:1; color:var(--mint); font-size:9px; font-weight:850; letter-spacing:.14em; }
.blueprint-card h3 { position:relative; z-index:1; margin:11px 0 7px; color:#f2f8f5; font-size:18px; letter-spacing:-.035em; }
.blueprint-card p { position:relative; z-index:1; margin:0; color:var(--ink-soft); font-size:13px; line-height:1.58; }
.task-list { display:grid; gap:9px; margin-top:13px; }
.task-item { display:grid; grid-template-columns:25px minmax(0,1fr); gap:10px; align-items:start; padding:14px; border-radius:16px; border:1px solid var(--line); background:linear-gradient(110deg, rgba(28,48,61,.74), rgba(12,25,36,.84)); color:#effaf5; cursor:pointer; text-align:left; transition:transform .15s ease,border-color .15s ease; }
.task-item:hover { transform:translateY(-1px); border-color:rgba(134,241,198,.34); }
.task-toggle { width:22px; height:22px; border-radius:8px; border:1.5px solid rgba(202,244,231,.43); display:grid; place-items:center; font-size:13px; margin-top:1px; color:#0f281e; }
.task-item.done .task-toggle { background:var(--mint); border-color:var(--mint); box-shadow:0 0 12px rgba(132,241,194,.34); }
.task-title { display:block; margin:0; font-weight:760; font-size:13px; line-height:1.35; }
.task-item.done .task-title { color:var(--ink-soft); text-decoration:line-through; }
.task-caption { display:block; margin:4px 0 0; color:var(--ink-soft); font-size:11px; line-height:1.45; }

.progress-row { display:flex; gap:10px; overflow-x:auto; padding-bottom:4px; }
.progress-pill { min-width:172px; padding:16px; border-radius:18px; background:linear-gradient(145deg, rgba(29,50,62,.78), rgba(15,28,40,.85)); border:1px solid var(--line); box-shadow:var(--shadow-soft); }
.progress-pill strong { display:block; color:#f4fbf7; font-size:23px; letter-spacing:-.06em; }
.progress-pill span { display:block; margin-top:4px; color:var(--ink-soft); font-size:11px; }

.profile-card { background:linear-gradient(145deg, rgba(28,48,61,.78), rgba(13,27,39,.91)); border:1px solid var(--line); border-radius:var(--radius-xl); padding:20px; box-shadow:var(--shadow-soft); }
.profile-avatar { width:54px; height:54px; display:grid; place-items:center; border-radius:19px; color:#0b241b; background:linear-gradient(135deg, var(--mint), #86dfff); font-size:20px; font-weight:850; box-shadow:0 13px 30px rgba(31,199,143,.18); }
.profile-card h2 { margin:14px 0 6px; color:#f5fbf7; font-size:26px; letter-spacing:-.06em; }
.profile-card p { margin:0; color:var(--ink-soft); font-size:13px; line-height:1.5; }
.settings-group { margin-top:20px; border-top:1px solid var(--line); }
.setting-row { width:100%; padding:16px 0; display:flex; align-items:center; justify-content:space-between; gap:12px; background:transparent; border:0; border-bottom:1px solid var(--line); color:var(--ink); text-align:left; cursor:pointer; }
.setting-row strong { display:block; color:#eaf7f1; font-size:13px; }
.setting-row span { display:block; margin-top:4px; color:var(--ink-soft); font-size:11px; }
.setting-row b { font-size:18px; color:var(--mint); }

<body>

  <script>
/* NIMOPRA SIGNAL v2 — offline-first premium prototype
   All data lives locally in the browser via localStorage.
*/

const STORAGE_KEY = "nimopra_signal_v1";
const app = {
  route: "home",
  activeProjectId: null,
  modalReturnRoute: null,
};

const $ = (selector, root = document) => root.querySelector(selector);
const $$ = (selector, root = document) => [...root.querySelectorAll(selector)];
const main = $("#mainContent");
const modalLayer = $("#modalLayer");
const modalContent = $("#modalContent");
const toast = $("#toast");

function makeId(prefix = "p") {
  return `${prefix}_${Date.now().toString(36)}${Math.random().toString(36).slice(2, 7)}`;
}

function initialState() {
  return {
    profile: { firstName: "Nico" },
    projects: [],
    completedTasks: 0,
    createdAt: new Date().toISOString(),
  };
}

function loadState() {
  try {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (!stored) return initialState();
    const parsed = JSON.parse(stored);
    return {
      ...initialState(),
      ...parsed,
      profile: { ...initialState().profile, ...(parsed.profile || {}) },
      projects: Array.isArray(parsed.projects) ? parsed.projects : [],
    };
  } catch {
    return initialState();
  }
}

let state = loadState();

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function escapeHtml(value = "") {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function daysSince(dateString) {
  const start = new Date(dateString);
  const now = new Date();
  return Math.max(0, Math.floor((now - start) / 86400000));
}

function projectProgress(project) {
  const tasks = project.tasks || [];
  if (!tasks.length) return 0;
  return Math.round((tasks.filter((task) => task.done).length / tasks.length) * 100);
}

function projectInitials(project) {
  const source = (project.title || "N").trim();
  return source.slice(0, 1).toUpperCase();
}

function scoreForProject(project) {
  const input = `${project.title} ${project.idea} ${project.audience} ${project.goal}`.toLowerCase();
  let score = 50;
  if ((project.idea || "").length > 90) score += 9;
  if ((project.audience || "").length > 7) score += 8;
  if ((project.goal || "").length > 7) score += 7;
  if (/(app|plattform|software|produkt|dienstleistung|service|lösung|kunden|menschen)/.test(input)) score += 5;
  if ((project.tasks || []).filter((task) => task.done).length) score += 6;
  return Math.max(54, Math.min(91, score));
}

function classifyIdea(project) {
  const input = `${project.title} ${project.idea}`.toLowerCase();
  if (/(app|plattform|website|software|digital|online|ki|ai)/.test(input)) return "digitale Lösung";
  if (/(produkt|gerät|erfind|technik|bauen|maschine|fahrrad)/.test(input)) return "physische oder technische Lösung";
  if (/(beratung|hilfe|service|dienstleistung|coaching|kurs)/.test(input)) return "Dienstleistung";
  if (/(musik|song|kunst|design|video|kreativ)/.test(input)) return "kreatives Angebot";
  return "neue Lösung";
}

function firstAudience(project) {
  const provided = (project.audience || "").trim();
  if (provided) return provided;
  return "eine klar definierte Personengruppe, die das Problem schon heute spürt";
}

function blueprintFor(project) {
  const category = classifyIdea(project);
  const audience = firstAudience(project);
  const concise = (project.idea || project.title).replace(/\s+/g, " ").trim();
  const shortIdea = concise.length > 120 ? `${concise.slice(0, 117)}…` : concise;
  const value = project.goal?.trim() || "Zeit, Unsicherheit, Aufwand oder Kosten spürbar zu reduzieren";
  return {
    core: `Die entscheidende Annahme: ${audience} hat ein echtes, wiederkehrendes Problem – und eine bessere ${category} wäre wertvoll genug, damit sie ausprobiert wird.`,
    audience: `Starte nicht mit „allen“. Teste zuerst mit ${audience}. Diese Menschen müssen nicht begeistert sein; sie müssen ehrlich sagen können, wie sie das Problem heute lösen.`,
    proof: `Erkläre „${shortIdea}“ in einem Satz. Zeige die Erklärung fünf passenden Menschen und frage nicht: „Findest du es gut?“ Frage: „Würdest du das in den nächsten 30 Tagen ausprobieren – und warum oder warum nicht?“`,
    next: `In den nächsten 48 Stunden: Schreibe eine einfache Ein-Seiten-Beschreibung mit Problem, Lösung und Nutzen „${value}“. Teile sie mit fünf passenden Menschen und notiere ihre wörtlichen Reaktionen.`,
  };
}

function defaultTasks(project) {
  return [
    { id: makeId("t"), title: "Das Problem in einem Satz formulieren", caption: "Ohne Fachbegriffe und ohne die Lösung vorwegzunehmen.", done: false },
    { id: makeId("t"), title: "Fünf passende Menschen auswählen", caption: `Die ersten Gespräche mit ${firstAudience(project)} vorbereiten.`, done: false },
    { id: makeId("t"), title: "Einen Minimal-Test festlegen", caption: "Eine Erklärung, Landingpage, Skizze oder ein einfacher Pilot reicht.", done: false },
    { id: makeId("t"), title: "Echte Reaktionen dokumentieren", caption: "Nicht interpretieren – wörtliche Aussagen aufschreiben.", done: false },
  ];
}

function makeProject({ title, idea, audience, goal }) {
  const project = {
    id: makeId("project"),
    title: title.trim(),
    idea: idea.trim(),
    audience: audience.trim(),
    goal: goal.trim(),
    createdAt: new Date().toISOString(),
    updatedAt: new Date().toISOString(),
    tasks: [],
  };
  project.tasks = defaultTasks(project);
  return project;
}

function showToast(message) {
  toast.textContent = message;
  toast.classList.remove("hidden");
  clearTimeout(showToast.timer);
  showToast.timer = setTimeout(() => toast.classList.add("hidden"), 2600);
}

function formatDate(dateString) {
  const date = new Date(dateString);
  return date.toLocaleDateString("de-DE", { day: "2-digit", month: "short" });
}

function render() {
  updateNav();
  const page = routes[app.route] || routes.home;
  main.innerHTML = page();
  main.classList.remove("page-enter");
  void main.offsetWidth;
  main.classList.add("page-enter");
  bindPage();
  main.focus({ preventScroll: true });
}

function updateNav() {
  $$(".nav-item").forEach((button) => {
    button.classList.toggle("active", button.dataset.route === app.route);
  });
}

const routes = {
  home: () => {
    const projects = [...state.projects].sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
    const completed = projects.reduce((sum, project) => sum + (project.tasks || []).filter((task) => task.done).length, 0);
    const live = projects.filter((project) => projectProgress(project) < 100).length;
    const name = escapeHtml(state.profile.firstName || "Nico");
    const startLabel = projects.length ? "Neue Idee starten" : "SIGNAL starten";
    return `
      <section class="home-screen">
        <div class="home-topline">
          <div>
            <p class="eyebrow"><span class="live-dot"></span> NIMOPRA SIGNAL / PERSÖNLICHER RAUM</p>
            <h1 class="hero-title">Hallo ${name}.<br><em>Mach Bewegung sichtbar.</em></h1>
          </div>
          <div class="profile-orb" aria-label="${name}">${escapeHtml((state.profile.firstName || "N").slice(0,1).toUpperCase())}</div>
        </div>
        <p class="hero-copy">Große Ideen brauchen keinen perfekten Anfang. Sie brauchen einen klaren ersten Beweis.</p>

        <article class="hero-card">
          <div class="hero-meta"><span class="signal-pill"><i></i>SIGNAL AKTIV</span><span>${projects.length ? `${projects.length} PROJEKT${projects.length === 1 ? "" : "E"}` : "DEIN STARTPUNKT"}</span></div>
          <div class="hero-body">
            <div>
              <p class="hero-kicker">DEIN NÄCHSTER BEWEIS</p>
              <h2>${projects.length ? "Eine Idee wird erst stark, wenn du sie testest." : "Deine erste Idee darf roh beginnen."}</h2>
              <p>${projects.length ? "Lege einen neuen Gedanken an oder führe ein bestehendes Projekt mit einem einzigen echten Schritt weiter." : "NIMOPRA bringt Problem, Zielperson, Minimal-Test und nächste Bewegung in eine klare Reihenfolge."}</p>
            </div>
            <div class="signal-orbit" aria-hidden="true"></div>
          </div>
          <div class="hero-footer">
            <div class="hero-metrics">
              <div class="hero-metric"><strong>${projects.length}</strong><span>PROJEKTE</span></div>
              <div class="hero-metric"><strong>${completed}</strong><span>SCHRITTE</span></div>
              <div class="hero-metric"><strong>${live}</strong><span>AKTIV</span></div>
            </div>
            <button class="inline-action" type="button" data-action="open-create">${startLabel} <span>↗</span></button>
          </div>
        </article>

        <div class="section-head"><h2>Dein Signal</h2><p>kleine Schritte · echter Fortschritt</p></div>
        <div class="stat-grid">
          <article class="stat-card"><span class="stat-num">${projects.length}</span><span class="stat-label">PROJEKTE</span></article>
          <article class="stat-card"><span class="stat-num">${live}</span><span class="stat-label">IN BEWEGUNG</span></article>
          <article class="stat-card"><span class="stat-num">${completed}</span><span class="stat-label">ERLEDIGT</span></article>
        </div>

        <div class="section-head"><h2>${projects.length ? "Zuletzt bewegt" : "Bereit, wenn du es bist"}</h2>${projects.length ? `<button type="button" class="small-action" data-route="projects">Alle Projekte</button>` : ""}</div>
        ${projects.length ? `<div class="project-list">${projects.slice(0, 3).map(projectCard).join("")}</div>` : emptyHomeCard()}
        <article class="tip-card"><p><strong>NIMOPRA-Prinzip:</strong> Suche nicht zuerst nach Zustimmung. Suche nach einer ehrlichen Reaktion von Menschen, die das Problem wirklich kennen.</p></article>
      </section>`;
  },

  projects: () => {
    const projects = [...state.projects].sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
    return `
      <section>
        <p class="eyebrow">DEINE IDEEN</p>
        <h1 class="screen-title">Projekte.</h1>
        <p class="screen-subtitle">Jede Idee bekommt hier ihren eigenen klaren Weg – vom ersten Gedanken bis zum echten Test.</p>
        <div class="button-row"><button class="primary-button" type="button" data-action="open-create">＋ Neue Idee starten</button></div>
        <div class="section-head"><h2>${projects.length ? `${projects.length} gespeicherte Projekte` : "Noch keine Projekte"}</h2><p>${projects.length ? "Tippe auf ein Projekt für den Blueprint." : ""}</p></div>
        ${projects.length ? `<div class="project-list">${projects.map(projectCard).join("")}</div>` : emptyProjectCard()}
      </section>`;
  },

  progress: () => {
    const projects = state.projects;
    const total = projects.reduce((sum, p) => sum + (p.tasks || []).length, 0);
    const done = projects.reduce((sum, p) => sum + (p.tasks || []).filter((t) => t.done).length, 0);
    const ratio = total ? Math.round((done / total) * 100) : 0;
    const starter = projects.filter((p) => projectProgress(p) === 0).length;
    const moving = projects.filter((p) => projectProgress(p) > 0 && projectProgress(p) < 100).length;
    return `
      <section>
        <p class="eyebrow">FORTSCHRITT</p>
        <h1 class="screen-title">Bewegung<br>statt Warten.</h1>
        <p class="screen-subtitle">NIMOPRA misst keinen Hype. Nur die Bewegungen, die aus einer Idee ein echtes Vorhaben machen.</p>
        <article class="signal-score-card" style="margin-top:22px">
          <div class="score-label">DEIN UMSETZUNGS-SIGNAL</div>
          <div class="score-row"><strong class="score-num">${ratio}</strong><p class="score-copy">% deiner geplanten ersten Schritte sind erledigt.</p></div>
          <div class="score-bar"><span style="width:${ratio}%"></span></div>
        </article>
        <div class="section-head"><h2>Dein Überblick</h2><p>heute</p></div>
        <div class="progress-row">
          <article class="progress-pill"><strong>${starter}</strong><span>noch am Anfang</span></article>
          <article class="progress-pill"><strong>${moving}</strong><span>in Bewegung</span></article>
          <article class="progress-pill"><strong>${done}</strong><span>Schritte erledigt</span></article>
        </div>
        <div class="section-head"><h2>Der nächste Fokus</h2><p>eine Sache reicht</p></div>
        ${nextFocusCard()}
      </section>`;
  },

  profile: () => `
    <section>
      <p class="eyebrow">DEIN RAUM</p>
      <h1 class="screen-title">Profil.</h1>
      <p class="screen-subtitle">NIMOPRA arbeitet in dieser ersten Version nur auf deinem Gerät.</p>
      <article class="profile-card" style="margin-top:22px">
        <div class="profile-avatar">${escapeHtml((state.profile.firstName || "N").slice(0,1).toUpperCase())}</div>
        <h2>${escapeHtml(state.profile.firstName || "Nico")}</h2>
        <p>Gründer von NIMOPRA Founding Edition. Die App speichert Projekte lokal im Browser – ohne Konto, ohne Cloud.</p>
        <div class="settings-group">
          <button class="setting-row" type="button" data-action="edit-profile"><span><strong>Name ändern</strong><span>Wie NIMOPRA dich ansprechen soll</span></span><b>›</b></button>
          <button class="setting-row" type="button" data-action="export-data"><span><strong>Projekte sichern</strong><span>Als JSON-Datei herunterladen</span></span><b>↓</b></button>

          <button class="setting-row" type="button" data-action="show-install"><span><strong>Auf iPhone installieren</strong><span>Als App zum Home-Bildschirm hinzufügen</span></span><b>›</b></button>
        </div>
      </article>
      <div class="button-row"><button type="button" class="danger-button" data-action="reset-data">Alle lokalen Daten löschen</button></div>
      <p class="notice">NIMOPRA SIGNAL gibt dir einen strukturierten Startpunkt. Die Ergebnisse ersetzen keine Rechts-, Steuer-, Medizin- oder Fachberatung.</p>
    </section>`,

  detail: () => {
    const project = state.projects.find((item) => item.id === app.activeProjectId);
    if (!project) { app.route = "projects"; return routes.projects(); }
    const blueprint = blueprintFor(project);
    const score = scoreForProject(project);
    const progress = projectProgress(project);
    return `
      <section>
        <div class="detail-head">
          <button class="back-button" type="button" data-action="back-projects" aria-label="Zurück">‹</button>
          <div style="min-width:0; flex:1"><p class="eyebrow">NIMOPRA BLUEPRINT</p><h1 class="detail-title">${escapeHtml(project.title)}</h1><p class="detail-desc">${escapeHtml(project.idea)}</p></div>
          <div class="detail-actions"><button class="round-action" type="button" data-action="edit-project" title="Projekt bearbeiten">✎</button><button class="round-action" type="button" data-action="delete-project" title="Projekt löschen">⌫</button></div>
        </div>
        <article class="signal-score-card">
          <div class="score-label">SIGNAL-KLARHEIT</div>
          <div class="score-row"><strong class="score-num">${score}</strong><p class="score-copy">Ein erster Wert dafür, wie konkret die Idee bereits beschrieben ist.</p></div>
          <div class="score-bar"><span style="width:${score}%"></span></div>
        </article>
        <div class="section-head"><h2>Dein Blueprint</h2><p>${formatDate(project.createdAt)}</p></div>
        <div class="blueprint-stack">
          ${blueprintCard("KERNANNAHME", "Was muss wahr sein?", blueprint.core)}
          ${blueprintCard("ERSTE ZIELPERSON", "Mit wem testest du?", blueprint.audience)}
          ${blueprintCard("MINIMALER BEWEIS", "Was zeigt echtes Interesse?", blueprint.proof)}
          ${blueprintCard("48-STUNDEN-MOVE", "Was machst du jetzt?", blueprint.next)}
        </div>
        <div class="section-head"><h2>Deine ersten Schritte</h2><p>${progress}% erledigt</p></div>
        <div class="task-list">${(project.tasks || []).map((task) => taskCard(project, task)).join("")}</div>
        <div class="button-row"><button class="secondary-button" type="button" data-action="add-task">＋ Eigenen Schritt ergänzen</button></div>
      </section>`;
  },
};

function emptyHomeCard() {
  return `<article class="empty-card"><h3>Deine erste Idee darf unfertig sein.</h3><p>Du brauchst keinen Businessplan. Beschreibe nur, was du verändern oder bauen möchtest – NIMOPRA gibt dir den ersten klaren Rahmen.</p><button class="small-action" type="button" data-action="open-create">Idee jetzt starten</button></article>`;
}

function emptyProjectCard() {
  return `<article class="empty-card"><h3>Hier entsteht dein Ideenarchiv.</h3><p>Sobald du eine Idee anlegst, erzeugt NIMOPRA deinen Blueprint und die ersten vier Umsetzungsschritte.</p><button class="small-action" type="button" data-action="open-create">Mit einer Idee beginnen</button></article>`;
}

function projectCard(project) {
  const progress = projectProgress(project);
  return `<button class="project-card" type="button" data-action="open-project" data-project-id="${project.id}">
    <span class="project-icon">${escapeHtml(projectInitials(project))}</span>
    <span style="min-width:0"><span class="project-name">${escapeHtml(project.title)}</span><span class="project-meta">${progress}% Schritte erledigt · gestartet ${formatDate(project.createdAt)}</span><span class="project-progress"><i style="width:${progress}%"></i></span></span>
    <span class="project-score">${scoreForProject(project)} SIGNAL</span>
  </button>`;
}

function blueprintCard(label, title, copy) {
  return `<article class="blueprint-card"><div class="card-label">${label}</div><h3>${title}</h3><p>${escapeHtml(copy)}</p></article>`;
}

function taskCard(project, task) {
  return `<button class="task-item ${task.done ? "done" : ""}" type="button" data-action="toggle-task" data-project-id="${project.id}" data-task-id="${task.id}">
    <span class="task-toggle">${task.done ? "✓" : ""}</span><span><span class="task-title">${escapeHtml(task.title)}</span><span class="task-caption">${escapeHtml(task.caption || "")}</span></span>
  </button>`;
}

function nextFocusCard() {
  const all = state.projects.flatMap((project) => (project.tasks || []).filter((task) => !task.done).map((task) => ({ project, task })));
  if (!all.length) return `<article class="empty-card"><h3>${state.projects.length ? "Starker Anfang." : "Noch kein Schritt vorhanden."}</h3><p>${state.projects.length ? "Du hast alle ersten Schritte erledigt. Jetzt ist der Moment, deine echten Reaktionen auszuwerten." : "Lege eine Idee an und NIMOPRA gibt dir sofort einen nächsten Schritt."}</p>${state.projects.length ? `<button class="small-action" data-route="projects" type="button">Projekte ansehen</button>` : `<button class="small-action" data-action="open-create" type="button">Idee starten</button>`}</article>`;
  const { project, task } = all[0];
  return `<article class="tip-card"><p class="eyebrow" style="margin-bottom:8px">${escapeHtml(project.title)}</p><p><strong>${escapeHtml(task.title)}</strong><br>${escapeHtml(task.caption || "Mach diesen Schritt klein genug, dass du ihn heute anfangen kannst.")}</p><div style="margin-top:13px"><button class="small-action" type="button" data-action="open-project" data-project-id="${project.id}">Projekt öffnen</button></div></article>`;
}

function bindPage() {
  $$('[data-route]').forEach((button) => {
    button.addEventListener('click', () => navigate(button.dataset.route));
  });
  $$('[data-action="open-create"]').forEach((button) => button.addEventListener('click', () => openCreateModal()));
  $$('[data-action="open-project"]').forEach((button) => button.addEventListener('click', () => openProject(button.dataset.projectId)));
  $$('[data-action="back-projects"]').forEach((button) => button.addEventListener('click', () => navigate('projects')));
  $$('[data-action="toggle-task"]').forEach((button) => button.addEventListener('click', () => toggleTask(button.dataset.projectId, button.dataset.taskId)));
  $$('[data-action="add-task"]').forEach((button) => button.addEventListener('click', openAddTaskModal));
  $$('[data-action="edit-project"]').forEach((button) => button.addEventListener('click', openEditProjectModal));
  $$('[data-action="delete-project"]').forEach((button) => button.addEventListener('click', confirmDeleteProject));
  $$('[data-action="edit-profile"]').forEach((button) => button.addEventListener('click', openProfileModal));
  $$('[data-action="export-data"]').forEach((button) => button.addEventListener('click', exportData));
  $$('[data-action="import-data"]').forEach((button) => button.addEventListener('click', openImportModal));
  $$('[data-action="show-install"]').forEach((button) => button.addEventListener('click', showInstallModal));
  $$('[data-action="reset-data"]').forEach((button) => button.addEventListener('click', confirmResetData));
}

function navigate(route) {
  app.route = route;
  if (route !== 'detail') app.activeProjectId = null;
  render();
}

function openProject(projectId) {
  app.activeProjectId = projectId;
  app.route = 'detail';
  render();
}

function toggleTask(projectId, taskId) {
  const project = state.projects.find((item) => item.id === projectId);
  const task = project?.tasks?.find((item) => item.id === taskId);
  if (!task) return;
  task.done = !task.done;
  project.updatedAt = new Date().toISOString();
  state.completedTasks = state.projects.reduce((sum, p) => sum + (p.tasks || []).filter((t) => t.done).length, 0);
  saveState();
  showToast(task.done ? 'Schritt erledigt. Stark.' : 'Schritt wieder geöffnet.');
  render();
}

function openModal(content) {
  modalContent.innerHTML = content;
  modalLayer.classList.remove('hidden');
  modalLayer.setAttribute('aria-hidden', 'false');
  const firstInput = $('input, textarea, select, button', modalContent);
  setTimeout(() => firstInput?.focus(), 10);
  bindModal();
}

function closeModal() {
  modalLayer.classList.add('hidden');
  modalLayer.setAttribute('aria-hidden', 'true');
  modalContent.innerHTML = '';
}

function modalTop(title) {
  return `<div class="modal-top"><h2 id="modalTitle">${title}</h2><button class="close-button" type="button" data-modal-action="close" aria-label="Schließen">×</button></div>`;
}

function openCreateModal() {
  openModal(`${modalTop('Neue Idee')}<p class="modal-subtitle">Beschreibe deine Idee so, wie du sie einem Menschen erklären würdest. NIMOPRA macht daraus direkt einen ersten Blueprint.</p>
    <form id="createProjectForm" class="form-shell">
      <label for="projectTitle">Name der Idee</label>
      <input id="projectTitle" class="text-field" maxlength="70" placeholder="Zum Beispiel: Plattform für Erfinder" required />
      <label for="projectIdea">Worum geht es?</label>
      <textarea id="projectIdea" class="text-area" maxlength="1000" placeholder="Welche Veränderung möchtest du schaffen? Was soll besser werden?" required></textarea>
      <p class="field-note">Je konkreter du schreibst, desto klarer wird dein erster Blueprint.</p>
      <div class="field-grid">
        <div><label for="projectAudience">Für wen?</label><input id="projectAudience" class="text-field" maxlength="100" placeholder="z. B. Menschen mit einer Idee" /></div>
        <div><label for="projectGoal">Welcher Nutzen?</label><input id="projectGoal" class="text-field" maxlength="120" placeholder="z. B. Klarheit schaffen" /></div>
      </div>
      <div class="form-actions"><button class="secondary-button" type="button" data-modal-action="close">Abbrechen</button><button class="primary-button mint" type="submit">SIGNAL erzeugen</button></div>
    </form>`);
}

function openEditProjectModal() {
  const project = state.projects.find((item) => item.id === app.activeProjectId);
  if (!project) return;
  openModal(`${modalTop('Projekt bearbeiten')}<p class="modal-subtitle">Du kannst deine Idee präziser machen. Dein Blueprint aktualisiert sich automatisch.</p>
    <form id="editProjectForm" class="form-shell">
      <label for="projectTitle">Name der Idee</label>
      <input id="projectTitle" class="text-field" maxlength="70" value="${escapeHtml(project.title)}" required />
      <label for="projectIdea">Worum geht es?</label>
      <textarea id="projectIdea" class="text-area" maxlength="1000" required>${escapeHtml(project.idea)}</textarea>
      <div class="field-grid">
        <div><label for="projectAudience">Für wen?</label><input id="projectAudience" class="text-field" maxlength="100" value="${escapeHtml(project.audience || '')}" /></div>
        <div><label for="projectGoal">Welcher Nutzen?</label><input id="projectGoal" class="text-field" maxlength="120" value="${escapeHtml(project.goal || '')}" /></div>
      </div>
      <div class="form-actions"><button class="secondary-button" type="button" data-modal-action="close">Abbrechen</button><button class="primary-button mint" type="submit">Speichern</button></div>
    </form>`);
}

function openAddTaskModal() {
  openModal(`${modalTop('Eigenen Schritt ergänzen')}<p class="modal-subtitle">Mach den Schritt klein und konkret. Ideal ist etwas, das du heute anfangen kannst.</p>
    <form id="addTaskForm" class="form-shell">
      <label for="taskTitle">Dein nächster Schritt</label><input id="taskTitle" class="text-field" maxlength="140" placeholder="z. B. Drei Menschen für Gespräche auswählen" required />
      <label for="taskCaption">Warum ist er wichtig?</label><textarea id="taskCaption" class="text-area" style="min-height:92px" maxlength="220" placeholder="Kurze Erinnerung für dich selbst"></textarea>
      <div class="form-actions"><button class="secondary-button" type="button" data-modal-action="close">Abbrechen</button><button class="primary-button mint" type="submit">Schritt hinzufügen</button></div>
    </form>`);
}

function openProfileModal() {
  openModal(`${modalTop('Wie soll NIMOPRA dich nennen?')}<form id="profileForm" class="form-shell"><label for="firstName">Vorname</label><input id="firstName" class="text-field" value="${escapeHtml(state.profile.firstName || '')}" maxlength="30" required /><div class="form-actions"><button class="secondary-button" type="button" data-modal-action="close">Abbrechen</button><button class="primary-button mint" type="submit">Speichern</button></div></form>`);
}

function openImportModal() {
  openModal(`${modalTop('Projekte wiederherstellen')}<p class="modal-subtitle">Lade eine NIMOPRA-Sicherungsdatei. Deine aktuellen Daten werden dadurch ersetzt.</p><form id="importForm" class="form-shell"><label for="importFile">Sicherungsdatei auswählen</label><input id="importFile" class="text-field" type="file" accept="application/json,.json" required /><div class="form-actions"><button class="secondary-button" type="button" data-modal-action="close">Abbrechen</button><button class="primary-button mint" type="submit">Wiederherstellen</button></div></form>`);
}

function showInstallModal() {
  openModal(`${modalTop('Auf deinem iPhone installieren')}<div class="form-shell"><p class="modal-subtitle" style="margin:0">Öffne diese Seite später in Safari. Tippe unten auf das Teilen-Symbol <strong>□↑</strong>, scrolle zu <strong>„Zum Home-Bildschirm“</strong> und bestätige mit <strong>Hinzufügen</strong>. Danach startet NIMOPRA wie eine eigene App.</p><p class="notice">Für die installierbare Version muss die App einmal kostenlos online veröffentlicht werden. Das erledigen wir als nächsten Schritt über GitHub Pages.</p><div class="form-actions"><button class="primary-button mint" type="button" data-modal-action="close">Verstanden</button></div></div>`);
}

function confirmDeleteProject() {
  const project = state.projects.find((item) => item.id === app.activeProjectId);
  if (!project) return;
  openModal(`${modalTop('Projekt löschen?')}<div class="form-shell"><p class="modal-subtitle" style="margin:0">„${escapeHtml(project.title)}“ und alle Schritte werden nur auf diesem Gerät gelöscht. Das lässt sich nicht rückgängig machen.</p><div class="form-actions"><button class="secondary-button" type="button" data-modal-action="close">Behalten</button><button class="danger-button" type="button" data-modal-action="delete-project">Jetzt löschen</button></div></div>`);
}

function confirmResetData() {
  openModal(`${modalTop('Alle lokalen Daten löschen?')}<div class="form-shell"><p class="modal-subtitle" style="margin:0">Das setzt NIMOPRA auf den Anfang zurück. Exportiere deine Projekte vorher, wenn du sie behalten möchtest.</p><div class="form-actions"><button class="secondary-button" type="button" data-modal-action="close">Abbrechen</button><button class="danger-button" type="button" data-modal-action="reset-all">Alles löschen</button></div></div>`);
}

function bindModal() {
  $$('[data-modal-action="close"]', modalContent).forEach((button) => button.addEventListener('click', closeModal));
  $('[data-modal-action="delete-project"]', modalContent)?.addEventListener('click', () => {
    state.projects = state.projects.filter((item) => item.id !== app.activeProjectId);
    saveState(); closeModal(); app.route = 'projects'; app.activeProjectId = null; showToast('Projekt gelöscht.'); render();
  });
  $('[data-modal-action="reset-all"]', modalContent)?.addEventListener('click', () => {
    state = initialState(); saveState(); closeModal(); app.route = 'home'; showToast('NIMOPRA wurde zurückgesetzt.'); render();
  });
  $('#createProjectForm', modalContent)?.addEventListener('submit', handleCreateProject);
  $('#editProjectForm', modalContent)?.addEventListener('submit', handleEditProject);
  $('#addTaskForm', modalContent)?.addEventListener('submit', handleAddTask);
  $('#profileForm', modalContent)?.addEventListener('submit', handleProfile);
  $('#importForm', modalContent)?.addEventListener('submit', handleImport);
}

function readProjectForm(form) {
  return {
    title: $('#projectTitle', form).value,
    idea: $('#projectIdea', form).value,
    audience: $('#projectAudience', form).value,
    goal: $('#projectGoal', form).value,
  };
}

function handleCreateProject(event) {
  event.preventDefault();
  const values = readProjectForm(event.currentTarget);
  if (values.idea.trim().length < 18) { showToast('Beschreibe die Idee bitte etwas genauer.'); return; }
  const project = makeProject(values);
  state.projects.unshift(project);
  saveState();
  closeModal();
  app.activeProjectId = project.id; app.route = 'detail';
  showToast('Dein erster Blueprint ist bereit.');
  render();
}

function handleEditProject(event) {
  event.preventDefault();
  const project = state.projects.find((item) => item.id === app.activeProjectId);
  if (!project) return;
  const values = readProjectForm(event.currentTarget);
  Object.assign(project, { ...values, updatedAt: new Date().toISOString() });
  saveState(); closeModal(); showToast('Projekt aktualisiert.'); render();
}

function handleAddTask(event) {
  event.preventDefault();
  const project = state.projects.find((item) => item.id === app.activeProjectId);
  const title = $('#taskTitle', event.currentTarget).value.trim();
  const caption = $('#taskCaption', event.currentTarget).value.trim();
  if (!project || !title) return;
  project.tasks.push({ id: makeId('t'), title, caption, done: false });
  project.updatedAt = new Date().toISOString();
  saveState(); closeModal(); showToast('Eigener Schritt ergänzt.'); render();
}

function handleProfile(event) {
  event.preventDefault();
  state.profile.firstName = $('#firstName', event.currentTarget).value.trim() || 'Nico';
  saveState(); closeModal(); showToast('Profil gespeichert.'); render();
}

function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `nimopra-sicherung-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(link); link.click(); link.remove(); URL.revokeObjectURL(url);
  showToast('Sicherung wurde heruntergeladen.');
}

function handleImport(event) {
  event.preventDefault();
  const file = $('#importFile', event.currentTarget).files?.[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const incoming = JSON.parse(reader.result);
      if (!incoming || !Array.isArray(incoming.projects)) throw new Error('invalid');
      state = { ...initialState(), ...incoming, profile: { ...initialState().profile, ...(incoming.profile || {}) } };
      saveState(); closeModal(); app.route = 'home'; showToast('Projekte wiederhergestellt.'); render();
    } catch {
      showToast('Diese Datei ist keine gültige NIMOPRA-Sicherung.');
    }
  };
  reader.readAsText(file);
}

modalLayer.addEventListener('click', (event) => { if (event.target === modalLayer) closeModal(); });
document.addEventListener('keydown', (event) => { if (event.key === 'Escape' && !modalLayer.classList.contains('hidden')) closeModal(); });

$('#headerCreate').addEventListener('click', openCreateModal);
$('#navCreate').addEventListener('click', openCreateModal);
$$('.nav-item').forEach((button) => button.addEventListener('click', () => navigate(button.dataset.route)));

render();

  </script>
</body>
</html>
